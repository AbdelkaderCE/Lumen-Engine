kind = "web"
previewPath = "/"
title = "Modular Search Engine"
version = "1.0.0"
id = "artifacts/search-engine"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24536

[services.development]
run = "pnpm --filter @workspace/search-engine run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/search-engine", "run", "build" ]
publicDir = "artifacts/search-engine/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24536"
BASE_PATH = "/"

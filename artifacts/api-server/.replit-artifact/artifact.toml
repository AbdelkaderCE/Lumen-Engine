kind = "api"
previewPath = "/api"
title = "Search Engine API"
version = "1.0.0"
id = "3B4_FFSkEVBkAeYMFRJ2e"

[[services]]
localPort = 8080
name = "API Server"
paths = ["/api"]

[services.env]
PORT = "8080"

[services.development]
run = "python -m uvicorn app.main:app --host 0.0.0.0 --port 8080 --app-dir artifacts/api-server"

[services.production]

[services.production.build]
args = ["python", "-c", "import nltk; nltk.download('stopwords', quiet=True)"]

[services.production.run]
args = ["python", "-m", "uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8080", "--app-dir", "artifacts/api-server"]

[services.production.run.env]
PORT = "8080"

[services.production.health.startup]
path = "/api/healthz"
